<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Hộp Quà Bí Ẩn</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#e1306c" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <section class="screen active" id="screen-gift">
    <div class="screen-content">
      <p class="gift-hint" id="gift-hint">Nhấn vào hộp quà để nhận phần thưởng! 🎁</p>

      <div class="giftbox" id="giftbox" role="button" aria-label="Mở hộp quà">
        <div class="giftbox__lid">
          <div class="giftbox__bow">
            <div class="bow-loop bow-loop--l"></div>
            <div class="bow-loop bow-loop--r"></div>
            <div class="bow-knot"></div>
          </div>
        </div>
        <div class="giftbox__body">
          <div class="giftbox__inner">
            <div class="countdown" id="countdown">06:00:00</div>
            <p class="inner-msg" id="inner-msg"></p>
          </div>
        </div>
      </div>

      <button class="btn btn-prize hidden" id="btn-prize">Nhận Quà 🎁</button>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
