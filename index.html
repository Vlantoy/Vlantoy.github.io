<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Hộp Quà Bí Ẩn</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#e1306c" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Quà Bí Ẩn" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══ Gift Box ════════════════════════════════════════════════ -->
  <section class="screen active" id="screen-gift">
    <div class="screen-content">
      <p class="gift-hint" id="gift-hint">Nhấn vào hộp quà của bạn! 🎁</p>

      <div class="giftbox" id="giftbox" role="button" aria-label="Mở hộp quà">
        <div class="giftbox__lid">
          <div class="giftbox__bow">
            <div class="bow-loop bow-loop--l"></div>
            <div class="bow-loop bow-loop--r"></div>
            <div class="bow-knot"></div>
          </div>
        </div>
        <div class="giftbox__body">
          <div class="giftbox__inner">
            <div class="countdown" id="countdown">06:00:00</div>
            <p class="inner-msg" id="success-msg"></p>
          </div>
        </div>
      </div>

      <p class="gift-status hidden" id="gift-status">⏳ Đang đăng ký...</p>

      <div class="gift-denied hidden" id="gift-denied">
        <p class="denied-title">🔔 Cần bật lại thông báo</p>
        <div class="denied-steps">
          <p><strong>Cài đặt</strong> điện thoại</p>
          <p>→ <strong>Ứng dụng</strong> → <strong>Chrome</strong></p>
          <p>→ <strong>Thông báo</strong></p>
          <p>→ Tìm <strong>vlantoy.github.io</strong> → <strong>Bật</strong></p>
        </div>
        <button class="btn btn-primary" id="btn-retry-notif" style="margin-top:14px">Đã bật, thử lại ↺</button>
      </div>

      <p class="error-msg hidden" id="error-msg"></p>
    </div>
  </section>

  <!-- OneSignal Web SDK v16 -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script src="app.js"></script>
</body>
</html>
